name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json OK')"
      - name: npm pack dry-run
        run: npm pack --dry-run
      - name: Run installer tests
        run: npm test
      - name: Validate marketplace.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('marketplace.json OK')"
      - name: Check bash scripts
        run: |
          find claudecode/plugins -name '*.sh' -exec bash -n {} \; -print
          echo "All bash scripts OK"
      - uses: astral-sh/setup-uv@v6
      - name: Run Codex Python tests
        run: uv run --with pytest --with pytest-asyncio python -m pytest -q
        working-directory: codex
